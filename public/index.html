<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 어시스턴트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header id="header">
    <button id="sidebar-toggle" aria-label="메뉴 열기">☰</button>
    <h1>📄 PDF 어시스턴트</h1>
  </header>

  <div id="app-container">

    <!-- 사이드바: 로드된 PDF 목록 -->
    <aside id="sidebar">
      <h2>로드된 문서</h2>
      <ul id="pdf-list">
        <li class="pdf-loading">문서 불러오는 중...</li>
      </ul>
    </aside>

    <!-- 모바일 오버레이 (사이드바 오픈 시 배경 딤처리) -->
    <div id="overlay"></div>

    <!-- 메인 채팅 영역 -->
    <main id="chat-container">

      <!-- 빈 상태 화면 -->
      <div id="empty-state">
        <span class="empty-icon">📄</span>
        <p>PDF 문서에 대해 질문해보세요!</p>
        <small>예시: "연차휴가는 며칠인가요?"</small>
      </div>

      <!-- 대화 내역 -->
      <div id="chat-messages"></div>

      <!-- 입력 영역 -->
      <div id="input-area">
        <textarea
          id="user-input"
          placeholder="질문을 입력하세요... (Enter: 전송 / Shift+Enter: 줄바꿈)"
          rows="1"
        ></textarea>
        <button id="send-btn" aria-label="전송">전송</button>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
